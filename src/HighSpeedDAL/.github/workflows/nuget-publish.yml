name: Publish NuGet Packages

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '!src/HighSpeedDAL.Example/**'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'build'
        type: choice
        options:
          - build
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Calculate version
      id: version
      shell: pwsh
      run: |
        # Get the current version from the first project file
        $projectFile = "src/HighSpeedDAL.Core/HighSpeedDAL.Core.csproj"
        
        if (-not (Test-Path $projectFile)) {
          Write-Error "Project file $projectFile not found"
          exit 1
        }
        
        [xml]$xml = Get-Content $projectFile
        $currentVersion = $xml.Project.PropertyGroup.Version | Where-Object { $_ -ne $null } | Select-Object -First 1
        
        if ([string]::IsNullOrEmpty($currentVersion)) {
          Write-Warning "No version found in $projectFile, using default version 1.0.0"
          $currentVersion = "1.0.0"
        }
        
        Write-Host "Current version: $currentVersion"
        
        # Validate version format
        if ($currentVersion -notmatch '^\d+\.\d+\.\d+$') {
          Write-Error "Invalid version format: $currentVersion. Expected: major.minor.build"
          exit 1
        }
        
        # Parse version
        $versionParts = $currentVersion -split '\.'
        $major = [int]$versionParts[0]
        $minor = [int]$versionParts[1]
        $build = if ($versionParts.Count -gt 2) { [int]$versionParts[2] } else { 0 }
        
        # Determine version bump type
        $bumpType = "${{ github.event.inputs.version_bump }}"
        if ([string]::IsNullOrEmpty($bumpType)) {
          $bumpType = "build"
        }
        
        # Calculate new version based on bump type
        switch ($bumpType) {
          "major" {
            $major++
            $minor = 0
            $build = 0
          }
          "minor" {
            $minor++
            $build = 0
          }
          "build" {
            $build++
          }
        }
        
        $newVersion = "$major.$minor.$build"
        Write-Host "New version: $newVersion"
        
        # Output for later steps
        echo "NEW_VERSION=$newVersion" >> $env:GITHUB_OUTPUT
        echo "version=$newVersion" >> $env:GITHUB_OUTPUT
    
    - name: Update project versions
      shell: pwsh
      run: |
        $newVersion = "${{ steps.version.outputs.NEW_VERSION }}"
        Write-Host "Updating all projects to version: $newVersion"
        
        # List of project files to update
        $projectFiles = @(
          "src/HighSpeedDAL.Core/HighSpeedDAL.Core.csproj",
          "src/HighSpeedDAL.SourceGenerators/HighSpeedDAL.SourceGenerators.csproj",
          "src/HighSpeedDAL.SqlServer/HighSpeedDAL.SqlServer.csproj",
          "src/HighSpeedDAL.Sqlite/HighSpeedDAL.Sqlite.csproj",
          "src/HighSpeedDAL.DataManagement/HighSpeedDAL.DataManagement.csproj",
          "src/HighSpeedDAL.AdvancedCaching/HighSpeedDAL.AdvancedCaching.csproj"
        )
        
        foreach ($projectFile in $projectFiles) {
          if (Test-Path $projectFile) {
            Write-Host "Updating $projectFile"
            [xml]$xml = Get-Content $projectFile
            
            # Find or create Version element
            $versionNode = $xml.Project.PropertyGroup.Version | Where-Object { $_ -ne $null } | Select-Object -First 1
            if ($versionNode) {
              # Update existing version
              $propertyGroup = $xml.Project.PropertyGroup | Where-Object { $_.Version -ne $null } | Select-Object -First 1
              $propertyGroup.Version = $newVersion
            } else {
              Write-Host "Warning: No Version element found in $projectFile"
            }
            
            $xml.Save((Resolve-Path $projectFile))
            Write-Host "Updated $projectFile to version $newVersion"
          } else {
            Write-Host "Warning: $projectFile not found"
          }
        }
    
    - name: Build solution
      run: dotnet build --configuration Release --no-restore
    
    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal
    
    - name: Pack NuGet packages
      run: |
        dotnet pack src/HighSpeedDAL.Core/HighSpeedDAL.Core.csproj --configuration Release --no-build --output ./nupkgs
        dotnet pack src/HighSpeedDAL.SourceGenerators/HighSpeedDAL.SourceGenerators.csproj --configuration Release --no-build --output ./nupkgs
        dotnet pack src/HighSpeedDAL.SqlServer/HighSpeedDAL.SqlServer.csproj --configuration Release --no-build --output ./nupkgs
        dotnet pack src/HighSpeedDAL.Sqlite/HighSpeedDAL.Sqlite.csproj --configuration Release --no-build --output ./nupkgs
        dotnet pack src/HighSpeedDAL.DataManagement/HighSpeedDAL.DataManagement.csproj --configuration Release --no-build --output ./nupkgs
        dotnet pack src/HighSpeedDAL.AdvancedCaching/HighSpeedDAL.AdvancedCaching.csproj --configuration Release --no-build --output ./nupkgs
    
    - name: List packages
      run: ls -la ./nupkgs/
    
    - name: Publish to GitHub Packages
      run: |
        dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
        dotnet nuget push "./nupkgs/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "github" --skip-duplicate
    
    - name: Commit version bump
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Explicitly add only the package project files
        git add src/HighSpeedDAL.Core/HighSpeedDAL.Core.csproj
        git add src/HighSpeedDAL.SourceGenerators/HighSpeedDAL.SourceGenerators.csproj
        git add src/HighSpeedDAL.SqlServer/HighSpeedDAL.SqlServer.csproj
        git add src/HighSpeedDAL.Sqlite/HighSpeedDAL.Sqlite.csproj
        git add src/HighSpeedDAL.DataManagement/HighSpeedDAL.DataManagement.csproj
        git add src/HighSpeedDAL.AdvancedCaching/HighSpeedDAL.AdvancedCaching.csproj
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "No version changes to commit"
          exit 0
        fi
        
        # Pull latest changes to avoid conflicts
        git pull --rebase origin main || {
          echo "Failed to pull latest changes, aborting commit"
          exit 1
        }
        
        # Commit and push with retry logic
        git commit -m "Bump version to ${{ steps.version.outputs.NEW_VERSION }} [skip ci]"
        
        max_retries=3
        retry_count=0
        until git push origin main || [ $retry_count -eq $max_retries ]; do
          retry_count=$((retry_count+1))
          echo "Push failed, retrying ($retry_count/$max_retries)..."
          git pull --rebase origin main
          sleep 2
        done
        
        if [ $retry_count -eq $max_retries ]; then
          echo "Failed to push after $max_retries attempts"
          exit 1
        fi
    
    - name: Create Git tag
      if: github.ref == 'refs/heads/main'
      run: |
        git tag "v${{ steps.version.outputs.NEW_VERSION }}"
        git push origin "v${{ steps.version.outputs.NEW_VERSION }}"
